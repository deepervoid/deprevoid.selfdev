<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<title>life dash.</title>
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#000000" />
<link rel="apple-touch-icon" href="icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:ital,wght@0,400;0,500;0,700;1,500;1,700&family=JetBrains+Mono:wght@400;500;700&family=UnifrakturMaguntia&display=swap');
  :root{
    --bg:#000000; --surface:#0A0A0A; --border:#1F1F1F; --border2:#2E2E2E;
    --text:#FFFFFF; --muted:#8A8A8A; --muted2:#C7C7C7;
    --blue:#3B82C4; --rust:#C1552C; --green:#4F9D69; --red:#C0455C;
  }
  .brand-title { font-style: italic; font-size:24px; font-weight:700; margin:0; letter-spacing:-0.3px; }
  .brand-sub { font-family:'UnifrakturMaguntia', cursive; font-size:16px; color:var(--muted2); letter-spacing:0.5px; margin-top:2px; }

  .heatmap-grid { display:flex; gap:3px; overflow-x:auto; padding-bottom:4px; -webkit-overflow-scrolling:touch; }
  .heatmap-col { display:flex; flex-direction:column; gap:3px; flex-shrink:0; }
  .heatmap-cell { width:11px; height:11px; border-radius:2px; background:#141414; }
  .heatmap-legend { display:flex; gap:4px; align-items:center; margin-top:8px; }
  .heatmap-legend .heatmap-cell { width:9px; height:9px; }

  .backup-banner { display:flex; justify-content:space-between; align-items:center; gap:10px; background:#1a1200; border:1px solid #4d3a00; color:#e0b32c; border-radius:10px; padding:10px 12px; font-size:12px; margin-bottom:14px; cursor:pointer; }

  .stage-bar { display:flex; gap:6px; }
  .stage-seg { flex:1; height:14px; border-radius:6px; background:#141414; }
  .stage-labels { display:flex; justify-content:space-between; margin-top:4px; }
  .stage-labels span { font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:0.4px; flex:1; text-align:center; }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; background:var(--bg); }
  body { font-family:'Space Grotesk', sans-serif; color:var(--text); }
  input, select, textarea { font-family:'JetBrains Mono', monospace; }
  ::placeholder { color:var(--muted); }
  button { cursor:pointer; font-family:inherit; }

  .app { min-height:100vh; padding:16px 14px 40px; max-width:720px; margin:0 auto; }
  .header { display:flex; flex-direction:column; gap:12px; margin-bottom:16px; }
  .kicker { font-family:'JetBrains Mono', monospace; font-size:11px; letter-spacing:1.5px; color:var(--muted); text-transform:uppercase; }
  .h1 { font-size:22px; font-weight:700; letter-spacing:-0.3px; margin:0; }
  .head-stats { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
  .head-stat { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:8px 6px; text-align:center; }
  .head-stat-val { font-family:'JetBrains Mono', monospace; font-size:18px; font-weight:700; }
  .head-stat-val.warn { color:var(--red); }
  .head-stat-label { font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:0.6px; margin-top:2px; }

  .tab-bar { display:flex; overflow-x:auto; gap:4px; margin-bottom:16px; padding-bottom:6px; border-bottom:1px solid var(--border); -webkit-overflow-scrolling:touch; }
  .tab-btn { display:flex; align-items:center; flex-shrink:0; gap:6px; background:transparent; border:none; color:var(--muted); font-family:'JetBrains Mono', monospace; font-size:12px; padding:8px 10px; border-radius:8px; white-space:nowrap; }
  .tab-btn.active { background:var(--surface); color:var(--text); border:1px solid var(--border2); }
  .tab-num { color:var(--blue); font-size:10px; }

  .grid { display:grid; grid-template-columns:1fr; gap:16px; }
  .row { display:flex; gap:16px; }
  .row .card { flex:1; }
  .card { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:16px; }
  .card-title { display:flex; align-items:center; gap:7px; font-size:13px; font-weight:600; margin-bottom:12px; color:var(--muted2); text-transform:uppercase; letter-spacing:0.5px; }

  .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:12px; }
  .field { display:flex; flex-direction:column; gap:4px; }
  .field.wide { grid-column:1 / -1; }
  .field-label { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; }
  .input { background:var(--surface); border:1px solid var(--border2); border-radius:8px; color:var(--text); padding:8px 10px; font-size:13px; width:100%; }
  .slider { width:100%; accent-color:var(--blue); }

  .btn-primary { display:inline-flex; align-items:center; gap:6px; background:var(--blue); border:none; color:var(--bg); font-weight:700; font-size:12px; padding:9px 14px; border-radius:8px; }
  .icon-btn { background:transparent; border:none; color:var(--muted); padding:4px; }
  .icon-btn-big { background:var(--blue); border:none; color:var(--bg); border-radius:8px; padding:0 12px; }

  .list { list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:8px; }
  .list-item-row { display:flex; justify-content:space-between; align-items:center; font-size:13px; border-bottom:1px solid var(--border); padding-bottom:8px; flex-wrap:wrap; gap:6px; }
  .row-left { display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
  .mono { font-family:'JetBrains Mono', monospace; color:var(--muted2); font-size:12px; }
  .subtle { color:var(--muted); font-size:12px; }
  .big-num { font-family:'JetBrains Mono', monospace; font-size:26px; font-weight:700; }
  .empty { color:var(--muted); font-size:12px; font-style:italic; padding:8px 0; }

  .checkbox { width:16px; height:16px; border-radius:4px; border:1.5px solid var(--blue); display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:11px; color:var(--bg); }
  .checkbox.done { background:var(--blue); }
  .dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .goal-text { text-decoration:none; }
  .goal-text.done { text-decoration:line-through; color:var(--muted); }

  svg text { font-family:'JetBrains Mono', monospace; fill:var(--muted); font-size:9px; }
</style>
</head>
<body>
<div id="app"></div>
<script type="module" src="app.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch((e) => console.warn('sw failed', e));
    });
  }
</script>
</body>
</html>
